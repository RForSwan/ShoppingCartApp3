services:
  mariadb:
    image: mariadb:10.6
    container_name: app_database
    environment:
      MARIADB_ROOT_PASSWORD: password
      MARIADB_DATABASE: shopping_cart_localization
      MARIADB_USER: app_user
      MARIADB_PASSWORD: password
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/1-init.sql
      - ./database/localization.sql:/docker-entrypoint-initdb.d/2-localization.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3

  java_app:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: java_app
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0.0}
#    volumes:
#      - /tmp/.X11-unix:/tmp/.X11-unix
    network_mode: host